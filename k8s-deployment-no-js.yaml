---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: gin-webapp-no-js
  labels:
    name: gin-webapp-no-js

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gin-webapp-no-js
  namespace: gin-webapp-no-js
  labels:
    app: gin-webapp-no-js
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gin-webapp-no-js
  template:
    metadata:
      labels:
        app: gin-webapp-no-js
    spec:
      containers:
      - name: gin-webapp-no-js
        image: gin-webapp:no-js
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "8080"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: gin-webapp-no-js-service
  namespace: gin-webapp-no-js
  labels:
    app: gin-webapp-no-js
spec:
  type: NodePort
  selector:
    app: gin-webapp-no-js
  ports:
  - name: http
    protocol: TCP
    port: 8080
    targetPort: 8080
    nodePort: 30081
  sessionAffinity: None

---
# Ingress (Optional - for domain-based access)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gin-webapp-no-js-ingress
  namespace: gin-webapp-no-js
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: gin-webapp-no-js.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gin-webapp-no-js-service
            port:
              number: 8080

